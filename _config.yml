about_content: |
  SRE & Cloud Architect with 6+ years designing and operating infrastructure at scale.
  Specialized in Kubernetes, observability, and cost optimization across AWS / OVH / Scaleway.

  <mark> Cloud Providers </mark>
    - AWS - AZURE - GCP - Scaleway - OVHcloud

  <mark> IaC & Automation </mark>
    - Ansible - Terraform - Pulumi - n8n
    - Packer - Vagrant - SaltStack - Cloud-Init

  <mark> CI/CD </mark>
    - Gitlab CI - Github Actions - ArgoCD - Flux

  <mark> AI / MLOps </mark>
    - Ollama - LLM infrastructure hosting (GPU nodes, model serving)
    - AI coding assistants integration in CI/CD pipelines

  <mark> Kubernetes & Docker </mark>
    - Helm - Kustomize - Istio - Calico - Cilium
    - Traefik - Nginx Ingress Controller - Gateway API
    - Rook-Ceph - Dockerfile - Docker Compose
    - KEDA - Karpenter - Velero

  <mark> Observability </mark>
    - OpenTelemetry - ELK Stack - OpenSearch - Fluentbit
    - Grafana - Prometheus - Thanos - Loki
    - Jaeger - Tempo - Promtail - Alertmanager - Datadog

  <mark> SRE Practices & FinOps </mark>
    - SLO / SLI / Error Budget definition and ownership
    - Incident management - PagerDuty - Opsgenie
    - On-call rotation management - Post-mortem / Blameless RCA
    - OpenCost - Kubecost

  <mark> Scripting & Databases </mark>
    - Bash - Python - Lua - Ruby
    - MySQL - MariaDB - PostgreSQL - ProxySQL

  <mark> Linux OS & Security </mark>
    - Debian - Ubuntu - Arch - Fedora - RedHat - Proxmox
    - Wazuh - Vault - Trivy - Sops - External Secrets Operator

  <mark> Web & Misc </mark>
    - Apache - Nginx - HAProxy - Git - RabbitMQ - Redis


